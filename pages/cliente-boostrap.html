<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos del cafetin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .contenedor { display: flex; gap: 30px; justify-content: space-between; }
        .panel { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #ddd; padding-bottom: 8px; }
        .campo { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; }
        input, select, button { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:hover { background-color: #f1f1f1; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Sistema de Pedidos - Cafetín</h1>

    <div class="contenedor">

        <div class="panel">
            <h2>Realizar Pedido (Cliente)</h2>

            <div class="campo">
                <label for="inNombreCliente">Nombre del Cliente:</label>
                <input type="text" id="inNombreCliente" placeholder="Ej: Juan">
            </div>

              <div class="campo">
                <label for="inApellidoCliente">Apellido del Cliente:</label>
                <input type="text" id="inApellidoCliente" placeholder="Ej: Pérez">
            </div>

            <div class="campo">
                <label for="inCedulaCliente">Cédula del Cliente:</label>
                <input type="text" id="inCedulaCliente" placeholder="Ej: 12345678">
            </div>

              <div class="campo">
                <label for="inEdadCliente">Edad del Cliente:</label>
                <input type="number" id="inEdadCliente" placeholder="Ej: 25">
            </div>

              <div class="campo">
                <label for="inSexoCliente">Sexo del Cliente:</label>
                <select id="inSexoCliente">
                    <option value=""> Seleccione </option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                </select>
            </div>

            <div class="campo">
                <label for="inCodProducto">Seleccione el Producto:</label>
                <select id="inCodProducto">
                    <option value=""> Seleccione </option>
                    <option value="P01">Café (P01) - $1.50</option>
                    <option value="P02">Empanada (P02) - $2.00</option>
                    <option value="P03">Hamburguesa (P03) - $1.75</option>
                    <option value="P04">Perro (P04) - $1.50</option>
                    <option value="P05">Pollo (P05) - $2.00</option>
                </select>
            </div>

            <div class="campo">
                <label for="inCntCantidad">Cantidad:</label>
                <input type="number" id="inCntCantidad" min="1" value="1">
            </div>

            <div class="campo">
                <label for="inBancoOrigen">Banco de Origen:</label>
                <input type="text" id="txtBancoOrigen" placeholder="Ej: Banesco">
            </div>

            <div class="campo">
                <label for="inDatosPago">Referencia del Pago:</label>
                <input type="text" id="txtDatosPago" placeholder="Ej: 12345678">
            </div>

            <button id = "btEnviar">Enviar Pedido al Cafetín</button>
        </div>

        <script type="module">
            import cCafetin from "../dist/controllers/Cl_cCafetin.js";

            document.addEventListener("DOMContentLoaded", () => {
            const cafetin = new cCafetin();

            console.log("¡ Sistema del Cafetín encendido y operativo!");
            });
        </script>
</body>
</html>
